name: Build Motorola Parrot Android 16 Kernel

on:
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  USE_BAZEL_VERSION: "6.4.0"
  BAZEL_CACHE: /home/runner/bazel-cache

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Maximize Build Space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Checkout Motorola Kernel Source
        uses: actions/checkout@v4
        with:
          repository: MotorolaMobilityLLC/kernel-msm
          ref: android-16-release-w1uui36h.110-31
          fetch-depth: 1
          path: msm-kernel

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential flex git libelf-dev libssl-dev \
            openssl zip unzip curl rsync xz-utils
          python -m pip install --upgrade pip
          pip install PyYAML

      - name: Restore Bazel Cache
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/bazel-cache
            /home/runner/.cache/bazel
          key: ${{ runner.os }}-bazel-moto-parrot-${{ hashFiles('msm-kernel/**', 'build/kernel/**') }}
          restore-keys: |
            ${{ runner.os }}-bazel-moto-parrot-

      - name: Checkout Android Kleaf Build Repo
        run: |
          mkdir -p build
          if [ ! -d build/kernel/.git ]; then
            git clone --depth 1 https://android.googlesource.com/kernel/build build/kernel
          fi

      - name: Provide Bazel launcher at workspace root
        run: |
          mkdir -p tools
          curl -L \
            https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 \
            -o tools/bazel
          chmod +x tools/bazel

      - name: Create Workspace File
        working-directory: msm-kernel
        run: |
          cp bazel.WORKSPACE ../WORKSPACE
          cp bazel.WORKSPACE ../WORKSPACE.bazel || true

      - name: Integrate KernelSU
        working-directory: msm-kernel
        run: |
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main

      - name: Integrate SUSFS Patches
        working-directory: msm-kernel
        run: |
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android15-6.6 ../susfs4ksu

          cp ../susfs4ksu/kernel_patches/fs/* ./fs/
          cp ../susfs4ksu/kernel_patches/include/linux/* ./include/linux/
          cp ../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./KernelSU/
          cp ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch .

          cd KernelSU
          patch -p1 < 10_enable_susfs_for_ksu.patch
          cd ..

          patch -p1 < 50_add_susfs_in_gki-android15-6.6.patch || true
          sed -i '/#include <linux\/proc_fs.h>/a #include <linux/susfs.h>' fs/proc/base.c

      - name: Inject Configuration Directives
        working-directory: msm-kernel
        run: |
          echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/vendor/gki_defconfig
          if [ -f arch/arm64/configs/vendor/parrot_defconfig ]; then
            echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/vendor/parrot_defconfig
          fi

      - name: Compile Kernel via Bazel
        working-directory: msm-kernel
        run: |
          python3 build_with_bazel.py \
            -t parrot gki \
            --cache_dir "${BAZEL_CACHE}" \
            -o "${GITHUB_WORKSPACE}/out" \
            --log info

      - name: Save Bazel Cache
        if: success()
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/bazel-cache
            /home/runner/.cache/bazel
          key: ${{ runner.os }}-bazel-moto-parrot-${{ hashFiles('msm-kernel/**', 'build/kernel/**') }}

      - name: Bundle Artifacts and Generate Checksums
        run: |
          mkdir -p distribution
          cp -r out/msm-kernel-parrot-gki/dist/* distribution/ 2>/dev/null || true
          cp -r out/*/dist/* distribution/ 2>/dev/null || true
          cd distribution
          if ls * >/dev/null 2>&1; then
            sha256sum * > SHA256SUMS.txt
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Moto-Parrot-Android16-Kernel
          path: distribution/*
