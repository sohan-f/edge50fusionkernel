name: Optimized Parrot Kernel Build

on:
  workflow_dispatch:
    inputs:
      ksu_branch:
        description: 'KernelSU Branch/Tag (e.g., main, v0.9.5)'
        required: true
        default: 'main'
      susfs_branch:
        description: 'SUSFS Branch/Tag (e.g., gki-android15-6.6)'
        required: true
        default: 'gki-android15-6.6'

env:
  PYTHON_VERSION: '3.11'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Optimization 1: Maximize storage to prevent Bazel from running out of disk space
      - name: Maximize Build Space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential flex git libelf-dev libssl-dev openssl zip unzip
          pip install PyYAML

      # Optimization 2: Cache the specific bazel-cache directory generated by your script
      - name: Restore Bazel Cache
        id: cache-bazel
        uses: actions/cache/restore@v4
        with:
          path: bazel-cache
          key: ${{ runner.os }}-bazel-parrot-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-bazel-parrot-

      # Optimization 3: Dynamically fetch KernelSU & SUSFS based on UI Inputs
      - name: Integrate KernelSU
        run: |
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s ${{ github.event.inputs.ksu_branch }}

      - name: Integrate SUSFS Patches
        run: |
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b ${{ github.event.inputs.susfs_branch }} ../susfs4ksu
          
          # Copy source files
          cp ../susfs4ksu/kernel_patches/fs/* ./fs/
          cp ../susfs4ksu/kernel_patches/include/linux/* ./include/linux/
          cp ../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./KernelSU/
          cp ../susfs4ksu/kernel_patches/50_add_susfs_in_kernel-6.6.patch .
          
          # Apply Patches
          cd KernelSU && patch -p1 < 10_enable_susfs_for_ksu.patch && cd ..
          patch -p1 < 50_add_susfs_in_kernel-6.6.patch

      - name: Inject Configuration
        run: |
          echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/vendor/gki_defconfig
          if [ -f arch/arm64/configs/vendor/parrot_defconfig ]; then
            echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/vendor/parrot_defconfig
          fi

      - name: Compile Kernel via Bazel
        run: |
          # Throttled resource allocation to survive the free GitHub Runner tier
          python3 build_with_bazel.py -t parrot gki \
            --lto=thin \
            --jobs=2 \
            --local_ram_resources=6144 \
            -o "$(pwd)/out"

      # Optimization 2 (Part 2): Save the cache state if the build finishes successfully
      - name: Save Bazel Cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: bazel-cache
          key: ${{ runner.os }}-bazel-parrot-${{ github.sha }}

      # Optimization 4: Package cleanly and generate SHA256 checksum verification
      - name: Prepare Artifacts
        run: |
          mkdir -p distribution
          # Copy the compiled GKI Image out of the distribution folder
          cp out/msm-kernel-parrot-gki/dist/Image distribution/
          # Copy companion kernel modules if any exist
          cp out/msm-kernel-parrot-gki/dist/*.ko distribution/ 2>/dev/null || true
          
          cd distribution
          sha256sum * > SHA256SUMS.txt

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Parrot-KernelSU-SUSFS
          path: distribution/*
