name: Build Motorola Parrot Android 16 Kernel

on:
  workflow_dispatch: # Allows you to trigger the build manually via the Actions Tab

env:
  PYTHON_VERSION: '3.11'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Optimization 1: Free up disk space so the massive Qualcomm Bazel footprint doesn't error out
      - name: Maximize Build Space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      # Optimization 2: Target the explicit external Motorola repository and your exact branch
      - name: Checkout Motorola Kernel Source
        uses: actions/checkout@v4
        with:
          repository: 'MotorolaMobilityLLC/kernel-msm'
          ref: 'android-16-release-w1uui36h.110-31'
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential flex git libelf-dev libssl-dev openssl zip unzip
          pip install PyYAML

      # Optimization 3: Maintain a cache folder so subsequent builds complete in minutes
      - name: Restore Bazel Cache
        id: cache-bazel
        uses: actions/cache/restore@v4
        with:
          path: bazel-cache
          key: ${{ runner.os }}-bazel-moto-parrot-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-bazel-moto-parrot-

      - name: Integrate KernelSU
        run: |
          # Pulls the official tool directly into the checked-out workspace root
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main

      - name: Integrate SUSFS Patches
        run: |
          # Clone the matching SUSFS branch one directory level above to keep the workspace root clean
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android15-6.6 ../susfs4ksu
          
          # Move core system patches and headers into position
          cp ../susfs4ksu/kernel_patches/fs/* ./fs/
          cp ../susfs4ksu/kernel_patches/include/linux/* ./include/linux/
          cp ../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./KernelSU/
          cp ../susfs4ksu/kernel_patches/50_add_susfs_in_kernel-6.6.patch .
          
          # Apply Inline Hooks
          cd KernelSU && patch -p1 < 10_enable_susfs_for_ksu.patch && cd ..
          patch -p1 < 50_add_susfs_in_kernel-6.6.patch

      - name: Inject Configuration Directives
        run: |
          # Inject configurations to both generic and target-specific defconfigs
          echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/vendor/gki_defconfig
          if [ -f arch/arm64/configs/vendor/parrot_defconfig ]; then
            echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/vendor/parrot_defconfig
          fi

      - name: Compile Kernel via Bazel
        run: |
          # Core constraint throttles to ensure execution stays under virtual runner resource hardware limits
          python3 build_with_bazel.py -t parrot gki \
            --lto=thin \
            --jobs=2 \
            --local_ram_resources=6144 \
            -o "$(pwd)/out"

      # Optimization 3 (Part 2): Update cache blocks if compilation succeeds
      - name: Save Bazel Cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: bazel-cache
          key: ${{ runner.os }}-bazel-moto-parrot-${{ github.sha }}

      - name: Bundle Artifacts and Generate Checksums
        run: |
          mkdir -p distribution
          # Collect successfully built assets
          cp out/msm-kernel-parrot-gki/dist/Image distribution/ 2>/dev/null || cp out/dist/Image distribution/ 2>/dev/null || true
          cp out/msm-kernel-parrot-gki/dist/*.ko distribution/ 2>/dev/null || cp out/dist/*.ko distribution/ 2>/dev/null || true
          
          # Generate integrity hash
          cd distribution
          sha256sum * > SHA256SUMS.txt

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Moto-Parrot-Android16-Kernel
          path: distribution/*
